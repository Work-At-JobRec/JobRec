<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JobRec</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: white;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding-top: 80px;
      text-align: center;
    }

    .navbar {
      background: #000;
      color: #fff;
      display: grid;
      grid-template-columns: 1.5fr 1fr 1fr 1fr;
      align-items: center;
      padding: 10px 18px;
      min-height: 58px;
      width: 100%;
      position: fixed;
      top: 0;
      left: 0;
    }

    .brand {
      font-size: 30px;
      font-weight: 700;
      justify-self: start;
      text-decoration: none;
      color: #fff;
    }

    .nav-item {
      font-size: 28px;
      font-weight: 700;
      justify-self: center;
      color: #fff;
    }

    .disabled {
      opacity: 0.5;
      cursor: default;
    }

    .title {
      font-size: 96px;
      font-weight: 700;
      color: black;
      margin-top: 80px;
      margin-bottom: 20px;
    }

    .subtitle {
      font-size: 22px;
      max-width: 800px;
      color: black;
      margin-bottom: 30px;
      line-height: 1.5;
    }

    .authors {
      font-size: 15px;
      color: black;
    }
  </style>
</head>

<body>

  <header class="navbar">
    <a href="/" class="brand">JobRec</a>
    <span class="nav-item disabled">Jobs</span>
    <span class="nav-item disabled">Search</span>
    <a href="/profile" class="nav-item">Profile</a>
  </header>

  <div class="title">JobRec</div>

  <div class="subtitle">
    The applicant-focused job board you didn't know you needed!
  </div>

  <div class="authors">
    Sharvari Deshpande, Luna Brown, Luke McCartney, and Pranav Putta
  </div>

</body>
</html>
